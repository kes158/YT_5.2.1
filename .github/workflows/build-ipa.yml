name: Build YTPlus IPA

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: 'Decrypted YouTube IPA direct download URL'
        required: true
        type: string
      app_name:
        description: 'App Name (Optional)'
        required: true
        default: 'YouTube'
        type: string
      bundle_id:
        description: 'BundleID (Optional)'
        required: true
        default: 'com.google.ios.youtube'
        type: string

      # ── 트윅 선택 옵션 ──────────────────────────
      enable_youpip: { description: 'YouPiP', default: true, type: boolean }
      enable_ytuhd: { description: 'YTUHD', default: true, type: boolean }
      enable_yq: { description: 'YouQuality', default: true, type: boolean }
      enable_ycq: { description: 'YouChooseQuality', default: true, type: boolean }
      enable_ryd: { description: 'Return YouTube Dislikes', default: true, type: boolean }
      enable_ytabc: { description: 'YTABConfig', default: true, type: boolean }
      enable_demc: { description: 'DontEatMyContent', default: true, type: boolean }
      enable_youloop: { description: 'YouLoop', default: true, type: boolean }
      enable_youspeed: { description: 'YouSpeed', default: true, type: boolean }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  build:
    name: Build YTPlus
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # ── 1. 메타데이터 추출 ───────────────────────
      - name: Extract Metadata
        id: meta
        run: |
          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          YT_VERSION=$(echo "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [[ -z "$YT_VERSION" ]]; then YT_VERSION="Unknown"; fi
          echo "ipa_name=YTPlus_5.2.1_${YT_VERSION}.ipa" >> "$GITHUB_OUTPUT"
          echo "tag=v${YT_VERSION}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      # ── 2. 저장소 체크아웃 ─────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 3. 도구 설치 ──────────────────────────
      - name: Install Build Tools
        run: |
          brew install make ldid dpkg aria2
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      # ── 4. Theos 및 SDK 설정 ──────────────────────────
      - name: Setup Theos
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/theos/theos.git $THEOS
          mkdir -p $THEOS/sdks
          git clone --quiet --depth=1 https://github.com/theos/sdks/
          mv sdks/iPhoneOS16.5.sdk $THEOS/sdks/
          echo "SDKVERSION=16.5" >> $GITHUB_ENV

      # ── 5. IPA 다운로드 (Dropbox 차단 방지 적용) ─────────────────────
      - name: Download Original IPA
        run: |
          URL="${{ github.event.inputs.decrypted_ipa_url }}"
          [[ "$URL" == *"dropbox.com"* ]] && URL="${URL/dl=0/dl=1}"
          aria2c -x 4 -s 4 -k 1M --user-agent="Mozilla/5.0" --retry-wait=5 --max-tries=10 "$URL" -o youtube.ipa

      # ── 6. 트윅 소스 준비 및 패치 (핵심 수정 구역) ────────────
      - name: Prepare Tweaks and Apply Fixes
        run: |
          mkdir -p ${{ github.workspace }}/tweaks_src
          cd ${{ github.workspace }}/tweaks_src

          REPOS=(
            "YouTubeHeader|https://github.com/PoomSmart/YouTubeHeader.git"
            "PSHeader|https://github.com/PoomSmart/PSHeader.git"
            "YouGroupSettings|https://github.com/PoomSmart/YouGroupSettings.git"
            "YTVideoOverlay|https://github.com/PoomSmart/YTVideoOverlay.git"
            "DontEatMyContent|https://github.com/therealFoxster/DontEatMyContent.git"
            "YouPiP|https://github.com/PoomSmart/YouPiP.git"
            "YouQuality|https://github.com/PoomSmart/YouQuality.git"
            "Return-YouTube-Dislikes|https://github.com/PoomSmart/Return-YouTube-Dislikes.git"
            "YTABConfig|https://github.com/PoomSmart/YTABConfig.git"
            "YouLoop|https://github.com/bhackel/YouLoop.git"
            "YouSpeed|https://github.com/PoomSmart/YouSpeed.git"
            "YouChooseQuality|https://github.com/PoomSmart/YouChooseQuality.git"
            "YTUHD|https://github.com/PoomSmart/YTUHD.git"
          )

          for repo in "${REPOS[@]}"; do
            name="${repo%%|*}"; url="${repo#*|}";
            git clone --quiet --depth=1 --recurse-submodules "$url" "$name" &
          done
          wait

          # 1. CoreImage 헤더 충돌 해결
          rm -rf PSHeader/CoreImage
          
          mkdir -p $THEOS/include/YTHeaders
          cp -R YouTubeHeader/* $THEOS/include/YTHeaders/
          cp -R PSHeader/* $THEOS/include/

          cp -R . ${{ github.workspace }}/
          cd ${{ github.workspace }}

          # 2. DontEatMyContent 링커 에러 (_constant) 해결 패치
          if [ -d "DontEatMyContent" ]; then
            echo "🔧 Patching DontEatMyContent..."
            # Tweak.h 에서 중복 선언 제거 및 extern 처리
            sed -i '' "s/^CGFloat constant;/extern CGFloat constant;/" DontEatMyContent/Tweak.h
            # Tweak.x 상단에 실제 변수 정의(Definition) 주입
            sed -i '' "1i\\
            CGFloat constant = 0;\\
            " DontEatMyContent/Tweak.x
          fi

      # ── 7. 컴파일 및 패키징 ────────────────────────
      - name: Compile Tweaks
        run: |
          mkdir -p ${{ github.workspace }}/ready_packages
          export DEBUG=0 FINALPACKAGE=1 SIDELOAD=1 SDKVERSION=16.5
          
          # YTUHD 종속성 빌드
          if [ -d "YTUHD" ]; then
            cd YTUHD/vendor/libvpx
            ./configure --target=arm64-darwin-gcc --disable-examples --disable-tools --disable-docs --enable-vp9-decoder --enable-pic
            make -j$(sysctl -n hw.ncpu) libvpx.a
            mkdir -p ../libvpx_ios && cp libvpx.a ../libvpx_ios/
            cd ${{ github.workspace }}
          fi

          # 트윅 개별 빌드
          for dir in */; do
            if [[ -f "$dir/Makefile" && "$dir" != "theos/" ]]; then
              echo "🔨 Building $dir..."
              cd "$dir"
              make clean
              make -j$(sysctl -n hw.ncpu) package
              cp packages/*.deb ${{ github.workspace }}/ready_packages/ 2>/dev/null || true
              cd ${{ github.workspace }}
            fi
          done

      # ── 8. 인젝션 및 릴리스 ──────────────────────────
      - name: Inject and Release
        run: |
          DEBS=$(ls ${{ github.workspace }}/ready_packages/*.deb | tr '\n' ' ')
          pyzule -i ./youtube.ipa -o "${{ steps.meta.outputs.ipa_name }}" -f $DEBS -n "${{ github.event.inputs.app_name }}" -b "${{ github.event.inputs.bundle_id }}"
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: ${{ steps.meta.outputs.ipa_name }}
